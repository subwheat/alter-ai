kind = "web"
previewPath = "/"
title = "alter.ai — LLM Cognition Simulator"
version = "1.0.0"
id = "artifacts/alter-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25064

[services.development]
run = "pnpm --filter @workspace/alter-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alter-ai", "run", "build" ]
publicDir = "artifacts/alter-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25064"
BASE_PATH = "/"
